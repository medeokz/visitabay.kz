# Apache reverse proxy example for staged DLE -> Node switch.
# Requirements:
#   LoadModule proxy_module modules/mod_proxy.so
#   LoadModule proxy_http_module modules/mod_proxy_http.so
#   LoadModule rewrite_module modules/mod_rewrite.so

ProxyPreserveHost On

# 1) Keep admin and legacy engine on DLE PHP.
ProxyPass        /admin.php !
ProxyPass        /engine/ !
ProxyPass        /uploads/ !
ProxyPass        /templates/ !
ProxyPass        /public/ !

# 2) Optional canary: only selected routes to Node.
#RewriteEngine On
#RewriteRule ^/(category|post|page)(/.*)?$ http://127.0.0.1:4000/$1$2 [P,L]

# 3) Full switch to Node frontend.
#ProxyPass        / http://127.0.0.1:4000/
#ProxyPassReverse / http://127.0.0.1:4000/

# Подпапка на том же хосте (пример: https://localhost/visitabay.kz/):
#   ProxyPass        /visitabay.kz/ http://127.0.0.1:4000/
#   ProxyPassReverse /visitabay.kz/ http://127.0.0.1:4000/
# В express-migration/.env задайте: PUBLIC_BASE_PATH=/visitabay.kz

