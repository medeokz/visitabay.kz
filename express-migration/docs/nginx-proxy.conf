server {
    listen 80;
    server_name visitabay.kz;

    # Static and uploads can stay from DLE folder.
    root /var/www/visitabay.kz;

    location /uploads/ { try_files $uri =404; }
    location /templates/ { try_files $uri =404; }
    location /public/ { try_files $uri =404; }

    # Keep DLE admin/backend on PHP while migrating.
    location ~ ^/(admin\.php|engine/) {
        try_files $uri /index.php?$args;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass php-fpm:9000;
    }

    # Canary routes to Node.
    location ~ ^/(post|category|page)/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:4000;
    }

    # Legacy static redirect handling in Node.
    location = /index.php {
        proxy_set_header Host $host;
        proxy_pass http://127.0.0.1:4000;
    }

    # Fallback to existing DLE.
    location / {
        try_files $uri $uri/ /index.php?$args;
    }
}

